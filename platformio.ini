[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino
lib_deps =
    pololu/QTRSensors @ ^4.0.0

build_flags =
    -I include

build_src_filter =
    +<*>

upload_speed = 921600
monitor_speed = 115200
monitor_port = COM3
monitor_filters =
    default
    time